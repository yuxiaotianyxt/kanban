<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>积分商城经营分析看板</title>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#0d1421;color:#38bdf8;font-family:'Microsoft YaHei',sans-serif;font-size:18px}
.spinner{width:40px;height:40px;border:3px solid #1a2332;border-top-color:#38bdf8;border-radius:50%;animation:spin 1s linear infinite;margin-right:15px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div><div class="spinner" style="display:inline-block;vertical-align:middle"></div>数据加载中，请稍候...</div>
<script>
function decodeBase64Utf8(b64){
  var binary=atob(b64);
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++){bytes[i]=binary.charCodeAt(i);}
  return new TextDecoder('utf-8').decode(bytes);
}
function renderKanban(){
  if(window.__d){
    var html=decodeBase64Utf8(window.__d);
    document.open();
    document.write(html);
    document.close();
  }
}
function fallbackLoad(){
  fetch('https://gitee.com/api/v5/repos/yuxiaotian123/kanban-public/contents/index.html?ref=master')
  .then(function(r){return r.json()})
  .then(function(d){
    var html=decodeBase64Utf8(d.content);
    document.open();
    document.write(html);
    document.close();
  })
  .catch(function(e){
    document.body.innerHTML='<div style="text-align:center"><p style="color:#ef4444;font-size:16px;margin-bottom:10px">加载失败</p><p style="color:#666;font-size:14px">'+e.message+'</p><p style="color:#666;font-size:14px;margin-top:15px">请刷新重试</p></div>';
  });
}
</script>
<script src="https://gitee.com/yuxiaotian123/kanban-public/raw/master/data.js" onload="renderKanban()" onerror="fallbackLoad()"></script>
</body>
</html>
